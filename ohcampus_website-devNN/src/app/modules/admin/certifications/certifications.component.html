                    <div class="bg-card rounded mt-4">
                        <h1 class="text-xl font-semibold p-4 py2 bg-primary-200 rounded-tl rounded-tr"> Related Articles
                        </h1>
                        <div class="p-3">
                            <div class="flex flex-col mt-2" *ngFor="let item of popular_blogsArr">
                                <div class="flex">
                                    <img class="w-20 h-20 mr-4 mt-1 rounded object-cover" [src]="item.image"
                                        alt="Card cover image">
                                    <div class="flex flex-col min-w-0 art">
                                        <a class="font-medium leading-normal cursor-pointer"
                                            (click)="getArticleDetails(item.id)">
                                            <p>{{item.title}}</p>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-card rounded mt-4">
                        <h1 class="text-xl font-semibold p-4 py2 bg-primary-200 rounded-tl rounded-tr"> Latest Articles
                        </h1>
                        <div class="p-3">
                            <div class="flex flex-col mt-2" *ngFor="let item of latest_blogsArr">
                                <div class="flex">
                                    <img class="w-20 h-20 mr-4 mt-1 rounded object-cover" [src]="item.image"
                                        alt="Card cover image">
                                    <div class="flex flex-col min-w-0 art">
                                        <!-- <div class="font-medium leading-normal">IIM Ahmedabad Hosts Special Convocation
                                            for ePGD-ABA 2022-2023 Batch, Get Details Here</div> -->
                                        <a class="font-medium leading-normal cursor-pointer"
                                            (click)="getArticleDetails(item.id)">
                                            <p>{{item.title}}</p>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>



                </div>
