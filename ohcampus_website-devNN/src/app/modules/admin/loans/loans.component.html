<div class="flex flex-col flex-auto min-w-0">

   <div class="heroSection relative" style="height: 20vh;">
      <div class="text-white z-10 textset">
         <form [formGroup]="searchLoanForm">
            <div class="flex justify-center mt-3">
               <mat-form-field class="md:w-1/2 w-full lg:w-1/2 h-12 bg-white rounded-md">
                  <input matInput class="text-black" [formControl]="searchControl" placeholder="Search here ...">
               </mat-form-field>
               <button mat-flat-button color="primary" class="rounded py-6 -ml-10"><mat-icon
                     matSuffix>search</mat-icon></button>
            </div>
         </form>
      </div>
   </div>

   <div class="flex-auto p-4">
      <div class="bg-card shadow rounded-2xl p-3 sm:p-10 mx-auto sm:mb-10 sm:mt-12 mt-8 max-w-screen-lg">
         <div class="bg-primary-200 shadow text-center rounded-2xl p-3 text-lg sm:text-4xl font-bold sm:-mt-18 -mt-8">
            LOANS
         </div>
         <div class="sm:pt-6 pt-4">
            <div class="text-lg font-medium flex items-center">
               <mat-icon svgIcon="mat_solid:circle" class="w-3 h-3 min-w-0 text-green-400 mr-2"></mat-icon>LOANS
               AVAILABLE TO STUDENTS IN INDIA
            </div>

            <table class="table table-striped table-bordered" style="width:100%">
               <thead>
                  <tr>
                     <th>No</th>
                     <th>Name Of Bank</th>
                     <th>Details</th>
                  </tr>
               </thead>
               <tbody>

                  <tr *ngFor="let item of loanArr,let i=index">
                     <td>{{i+1}}</td>
                     <td>{{item.name}}</td>
                     <td> <a [href]="item.file_or_link" target="_blank">Click
                           Here</a> </td>
                  </tr>

               </tbody>
            </table>
         </div>
      </div>
   </div>

</div>
