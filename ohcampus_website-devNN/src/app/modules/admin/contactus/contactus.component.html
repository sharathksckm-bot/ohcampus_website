<div class="flex flex-col flex-auto min-w-0">

    <!-- Main -->
    <div class="flex-auto">

        <!-- <div class="heroSection relative">
            <div class="text-white z-10 textset">
            <div class="md:text-5xl lg:text-5xl text-4xl text-center font-bold">
                Contact Us
            </div>
        
            </div>

        <div class="p-6 sm:px-14 md:px-30 lg:px-30 bgContactc md:my-4 lg:my-4">
            <div class="text-5xl text-center font-bold headStyle">Contact Us</div>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 gap-6 mt-8">
                <div class="flex flex-col flex-auto min-w-0 relative bg-card shadow rounded-xl p-6">

                    <div class="text-3xl mt-2 font-bold">Address Details :</div>
                    <p class="text-lg text-secondary mt-6">
                        2nd Floor, SMG Plaza,<br>
                        Opp. Sangeetha Mobiles,<br>
                        M G Road, Chikkamagaluru, Pincode– 577101,<br>
                        Karnataka, India<br>
                        Enquiry : enquiry@ohcampus.com<br>
                        Telephone : +91 7019924014
                    </p>
                    <img src="assets/images/contact-us.jpg" style="width:300px" alt="">
                </div>

                <div class="flex flex-col col-span-2 flex-auto min-w-0 relative">
                    <form [formGroup]="contactUsForm" #contactUsNgForm="ngForm">
                        <div class="mt-2 text-center s_btn font-semibold mb-2" style="color: #88d834;">
                            <!-- <button mat-stroked-button color="secondaryButton" class="rounded ml-2"
                                style="color: #88d834;"> -->
                            {{showInquiryMsg}}
                            <!-- </button> -->
                        </div>
                        <div
                            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 bg-card shadow rounded-xl lg:p-10 p-4 md:p-10">
                            <mat-form-field class="w-full">
                                <mat-label> Name </mat-label>
                                <input matInput formControlName="name">
                            </mat-form-field>
                            <mat-form-field class="w-full">
                                <mat-label>Contact No </mat-label>
                                <input matInput formControlName="contactNo" maxlength="10" minlength="10"
                                    (keypress)="numberOnly($event)">
                            </mat-form-field>
                            <mat-form-field class="w-full md:col-span-2 lg:col-span-2">
                                <mat-label>Email ID</mat-label>
                                <input matInput formControlName="email">
                            </mat-form-field>

                            <mat-form-field class="w-full md:col-span-2 lg:col-span-2">
                                <mat-label>Subject </mat-label>
                                <input matInput placeholder="Type here ..." formControlName="subject">
                            </mat-form-field>

                            <mat-form-field class="w-full md:col-span-2 lg:col-span-2">
                                <mat-label>Message </mat-label>
                                <input matInput placeholder="Type here ..." formControlName="message">
                            </mat-form-field>

                            <div class="text-center md:col-span-2 lg:col-span-2">
                                <button mat-raised-button color="primary" class="px-12 text-lg justify-center mt-2 "
                                    (click)="contactUs()">Submit</button>
                            </div>


                        </div>

                    </form>
                </div>

            </div>
        </div>

    </div>
</div>
