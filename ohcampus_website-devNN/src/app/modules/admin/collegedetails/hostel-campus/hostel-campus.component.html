                    <div class="border-t border-b  my-6 py-6" [innerHTML]="hostelDescription">

                    </div>


                </div>

                <div class="flex flex-col flex-auto min-w-0 ">

                    <form [formGroup]="EnqForm" #EnqFormNgForm="ngForm">
                        <div class="bg-card rounded ">
                            <h1 class="text-xl font-semibold p-4 py2 bg-primary-200 rounded-tl rounded-tr"> Quick
                                Enquiry
                            </h1>
                            <div class="p-3">
                                <mat-form-field class="w-full">
                                    <mat-label>Full Name</mat-label>
                                    <input matInput formControlName="name">
                                </mat-form-field>

                                <mat-form-field class="w-full">
                                    <mat-label>Email ID</mat-label>
                                    <input matInput formControlName="email">
                                </mat-form-field>

                                <mat-form-field class="w-full">
                                    <mat-label>Phone No</mat-label>
                                    <input matInput formControlName="phone_no" maxlength="10" minlength="10"
                                        (keypress)="numberOnly($event)">
                                </mat-form-field>

                                <mat-form-field class="w-full">
                                    <mat-label>State </mat-label>
                                    <mat-select formControlName="state" (ngModelChange)="getCityByState()">
                                        <!-- <mat-option *ngFor="let state of stateArr" [value]="state.id">
                                            {{state.statename}}
                                        </mat-option> -->
                                        <mat-option>
                                            <ngx-mat-select-search noEntriesFoundLabel="No matching type found"
                                                placeholderLabel="Find state ..." [formControl]="stateFilterCtrl">
                                            </ngx-mat-select-search>
                                        </mat-option>
                                        <mat-option *ngFor="let course of stateTypeFilter | async" [value]="course.id">
                                            {{course.statename}}
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>

                                <mat-form-field class="w-full">
                                    <mat-label>City </mat-label>
                                    <mat-select formControlName="city">
                                        <!-- <mat-option *ngFor="let city of cityArr" [value]="city.id">
                                            {{city.city}}
                                        </mat-option> -->
                                        <mat-option>
                                            <ngx-mat-select-search noEntriesFoundLabel="No matching type found"
                                                placeholderLabel="Find city ..." [formControl]="cityFilterCtrl">
                                            </ngx-mat-select-search>
                                        </mat-option>
                                        <mat-option *ngFor="let course of cityTypeFilter | async" [value]="course.id">
                                            {{course.city}}
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>

                                <mat-form-field class="w-full">
                                    <mat-label>Message </mat-label>
                                    <textarea matInput formControlName="message"></textarea>
                                </mat-form-field>

                                <button class="fuse-mat-button-large w-full mt-2 mb-4" mat-flat-button
                                    [color]="'primary'" (click)="saveEnquiry()">
                                    <span> Submit</span>
                                </button>
                                <div class="mt-2 text-center s_btn font-semibold" style="color: #88d834;">
                                    <!-- <button mat-stroked-button color="secondaryButton" class="rounded ml-2"
                                        style="color: #88d834;"> -->
                                    {{showInquiryMsg}}
                                    <!-- </button> -->
                                </div>
                            </div>
                        </div>
                    </form>

                    

                    

                    


                </div>



            </div>
        </div>
    </div>

</div>
