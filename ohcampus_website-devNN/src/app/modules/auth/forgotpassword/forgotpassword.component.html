<div class="flex flex-col sm:flex-row items-center md:items-center sm:justify-center md:justify-center flex-auto min-w-0">
    <div class="md:flex md:items-center md:justify-center w-full sm:w-auto md:w-1/3 m-4 md:m-6 py-8 px-4 sm:p-12 md:p-16 rounded-xl  shadow sm:bg-card">
        <div class="w-full mx-auto">
            <!-- Logo -->
            <div class="w-44 mb-6">
                <img src="assets/images/logo/logo.png">
            </div>

            <!-- Title -->
            <div class="mt-8 text-3xl font-bold tracking-tight leading-tight">Reset Password Form</div>
            <div class="mt-0.5 font-medium">Please enter your new password and confirm it below to reset your account password.</div>

            <!-- Forgot password form -->
            <form [formGroup]="ResetpasswordForm" class="mt-8">

                <!-- Email field -->
                <mat-form-field class="w-full">
                    <mat-label>New Password</mat-label>
                    <input matInput formControlName="newpass" minlength="8">
                    <mat-error *ngIf="ResetpasswordForm.get('newpass').hasError('required')">
                         Password is required
                    </mat-error>
                    <!-- <mat-error *ngIf="ResetpasswordForm.get('newpass').hasError('minlength')">
                        Password must be at least 8 characters long.
                    </mat-error> -->
                    <mat-error *ngIf="ResetpasswordForm.get('newpass').hasError('pattern')">
                        Password must contain at least one lowercase letter, one uppercase letter, one digit, and one special character
                    </mat-error>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Confirm New Password</mat-label>
                    <input matInput formControlName="confirmpass">
                    <mat-error *ngIf="ResetpasswordForm.get('confirmpass').hasError('required')">
                     Confirm Password is required
                    </mat-error>
                    <!-- <mat-error *ngIf="ResetpasswordForm.get('confirmpass').hasError('mismatch')">
                        Passsword and Confirm Password didn't match.
                    </mat-error> -->
                </mat-form-field>

                <!-- Submit button -->
                <button class="fuse-mat-button-large w-full mt-3"
                    mat-flat-button [color]="'primary'" (click)="UpdateNewPass()">
                    <span>
                        Reset Password 
                    </span>
                </button>

                <!-- Form footer -->
                <div class="mt-8 text-md font-medium text-secondary">
                    <!-- <span><b>Note :</b> Your new password must match the confirmed password field exactly.</span> -->
                    
                </div>

            </form>
        </div>
    </div>
   
</div>
